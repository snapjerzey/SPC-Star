<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPC Star</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f766e">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <p class="eyebrow">SPC Star</p>
        <h1>Inspection Console</h1>
      </div>
      <div class="status-row">
        <span id="syncStatus" class="status-pill neutral">Online</span>
        <span id="userBadge" class="status-pill">Not signed in</span>
      </div>
    </section>

    <section id="loginPanel" class="panel compact">
      <div class="panel-heading">
        <h2>Sign In</h2>
        <p>Use a seeded demo user for now.</p>
      </div>
      <form id="loginForm" class="form-grid">
        <label>
          User
          <input id="userName" autocomplete="username" value="operator1">
        </label>
        <label>
          Password
          <input id="password" type="password" autocomplete="current-password" value="operator1">
        </label>
        <button type="submit">Sign in</button>
      </form>
    </section>

    <section id="workPanel" class="workspace hidden">
      <aside class="panel">
        <div class="panel-heading">
          <h2>Work Context</h2>
          <p id="setupVersion">Setup not loaded</p>
        </div>
        <form id="contextForm" class="stacked-form">
          <label>
            Job
            <select id="jobNum"></select>
          </label>
          <label>
            Resource
            <select id="resourceId"></select>
          </label>
          <label>
            Inspection Plan
            <select id="inspectionPlan"></select>
          </label>
          <button type="submit">Load</button>
        </form>
      </aside>

      <section class="main-column">
        <div id="lockBanner" class="lock-banner hidden"></div>
        <section class="panel">
          <div class="panel-heading horizontal">
            <div>
              <h2 id="contextTitle">No context loaded</h2>
              <p id="contextSubtitle">Choose a job, resource, and inspection plan.</p>
            </div>
            <span id="dueStatus" class="status-pill neutral">Not checked</span>
          </div>

          <div class="limit-grid">
            <div><span>LSL</span><strong id="lsl">-</strong></div>
            <div><span>Target</span><strong id="nominal">-</strong></div>
            <div><span>USL</span><strong id="usl">-</strong></div>
            <div><span>LCL</span><strong id="lcl">-</strong></div>
            <div><span>Center</span><strong id="center">-</strong></div>
            <div><span>UCL</span><strong id="ucl">-</strong></div>
          </div>

          <form id="measurementForm" class="measurement-form">
            <label>
              Measurement
              <input id="measurementValue" type="number" step="0.0001" inputmode="decimal" placeholder="0.0000">
            </label>
            <button type="submit">Submit Measurement</button>
          </form>
          <p id="entryMessage" class="message"></p>
        </section>

        <section class="panel">
          <div class="panel-heading horizontal">
            <h2>Recent Measurements</h2>
            <button id="refreshButton" type="button" class="secondary">Refresh</button>
          </div>
          <div id="measurementList" class="measurement-list empty">No measurements yet.</div>
        </section>
      </section>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
